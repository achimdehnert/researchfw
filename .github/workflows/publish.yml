# publish.yml — iil-researchfw PyPI publish via OIDC Trusted Publishing
#
# RELEASE WORKFLOW:
#   git tag iil-researchfw@0.1.0
#   git push origin iil-researchfw@0.1.0
#   → GitHub Actions builds + publishes (zero tokens needed)
#
# PyPI Trusted Publisher:
#   Repository: achimdehnert/researchfw
#   Workflow:   publish.yml
#   Environment: pypi

name: Publish to PyPI

on:
  push:
    tags:
      - "iil-researchfw@*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install hatch
        run: pip install hatch

      - name: Determine version from tag
        id: pkg
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#*@}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing iil-researchfw v$VERSION"

      - name: Set version in pyproject.toml
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          echo "Set version to $VERSION"
          grep '^version' pyproject.toml

      - name: Build
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
