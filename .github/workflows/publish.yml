# publish.yml — iil-researchfw PyPI publish via OIDC Trusted Publishing
#
# RELEASE WORKFLOW:
#   git tag iil-researchfw@0.1.0
#   git push origin iil-researchfw@0.1.0
#   → GitHub Actions builds + publishes (zero tokens needed)
#
# PyPI Trusted Publisher:
#   Repository: achimdehnert/researchfw
#   Workflow:   publish.yml
#   Environment: pypi

name: Publish to PyPI

on:
  push:
    tags:
      - "iil-researchfw@*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install hatch
        run: pip install hatch

      - name: Read version from pyproject.toml
        id: pkg
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing iil-researchfw v$VERSION"

      - name: Build
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
          skip-existing: true
